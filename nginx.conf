# Opportunity Scan – Nginx reverse proxy config
# Placera på servern: /etc/nginx/sites-available/opportunity-scan
# Aktivera: sudo ln -s /etc/nginx/sites-available/opportunity-scan /etc/nginx/sites-enabled/
# Ladda om: sudo nginx -t && sudo systemctl reload nginx
#
# Byt ut DOMAIN mot ditt riktiga domännamn (t.ex. scan.xzero.se)
# HTTPS-certifikat sköts av Certbot: sudo certbot --nginx -d DOMAIN

server {
    listen 80;
    server_name DOMAIN;

    # Certbot fyller i HTTPS-redirect automatiskt vid: certbot --nginx
    # (ersätter detta block med redirect + SSL-server-block)

    # Tillåt stora PDF-uppladdningar (upp till 500 MB per fil)
    client_max_body_size 512M;

    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Kritiskt för streaming-svar (SSE) – stäng av buffring
        proxy_buffering    off;
        proxy_cache        off;

        # Lång timeout för LLM-anrop (kan ta 1–2 min)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
