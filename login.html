<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logga in – xZero</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f8fafc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 2.25rem 2rem;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.03em;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-size: 0.82rem;
    color: #94a3b8;
    margin-bottom: 1.75rem;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #374151;
    margin-bottom: 0.35rem;
  }

  input[type="password"] {
    width: 100%;
    padding: 0.62rem 0.85rem;
    border: 1px solid #d1d5db;
    border-radius: 7px;
    font-size: 0.9rem;
    font-family: inherit;
    color: #1a202c;
    background: #fff;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="password"]:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }
  input[type="password"].error {
    border-color: #ef4444;
  }

  .field-error {
    font-size: 0.72rem;
    color: #ef4444;
    margin-top: 0.3rem;
    min-height: 1rem;
  }

  .btn {
    width: 100%;
    padding: 0.72rem 1rem;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 0.92rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.15s;
  }
  .btn:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">xZero</div>
  <div class="subtitle">Opportunity Scan – intern åtkomst</div>

  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <div>
      <label for="password">Lösenord</label>
      <input type="password" id="password" name="password"
             autofocus autocomplete="current-password"
             class="{{ 'error' if error else '' }}">
      <div class="field-error">{{ error }}</div>
    </div>
    <button type="submit" class="btn">Logga in</button>
  </form>
</div>
</body>
</html>
